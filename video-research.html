<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元動画リサーチ — Harbinger</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: 'Hiragino Sans', sans-serif; padding: 20px; max-width: 700px; margin: 0 auto; }

  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #555; font-size: 13px; margin-bottom: 28px; }

  .section { margin-bottom: 28px; }
  .section-title { font-size: 13px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

  .input-row { display: flex; gap: 8px; }
  input[type="text"], textarea {
    background: #111; border: 1px solid #222; border-radius: 10px;
    color: #fff; font-size: 15px; padding: 12px 14px; width: 100%;
    outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus, textarea:focus { border-color: #ff4444; }
  textarea { resize: vertical; min-height: 60px; font-family: inherit; }

  .btn { border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; padding: 12px 20px; transition: all 0.15s; white-space: nowrap; }
  .btn-red   { background: #ff4444; color: #fff; }
  .btn-red:hover { background: #ff2222; }
  .btn-gray  { background: #1e1e1e; color: #aaa; border: 1px solid #333; }
  .btn-gray:hover { background: #2a2a2a; color: #fff; }
  .btn-green { background: #22c55e; color: #fff; }
  .btn-green:hover { background: #16a34a; }
  .btn-sm { font-size: 12px; padding: 6px 12px; border-radius: 7px; }

  .form-box { background: #111; border: 1px solid #222; border-radius: 14px; padding: 20px; }
  .form-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  label.form-label { font-size: 12px; color: #888; }

  .checks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .check-pill { display: flex; align-items: center; gap: 6px; background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: 13px; transition: all 0.15s; user-select: none; }
  .check-pill.active { background: #1a2a1a; border-color: #22c55e; color: #22c55e; }

  .format-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .fmt { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .fmt:hover { border-color: #ff4444; }
  .fmt.selected { background: #2a0000; border-color: #ff4444; color: #ff4444; }

  #list { display: flex; flex-direction: column; gap: 12px; }
  .card { background: #111; border: 1px solid #222; border-radius: 14px; padding: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: bold; }
  .card-score { font-size: 13px; color: #22c55e; font-weight: bold; }
  .card-url { font-size: 12px; color: #555; margin-bottom: 6px; word-break: break-all; }
  .card-url a { color: #4499ff; text-decoration: none; }
  .card-url a:hover { text-decoration: underline; }
  .card-note { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; background: #1a2a1a; border: 1px solid #22c55e; color: #22c55e; border-radius: 12px; padding: 3px 10px; }
  .tag.fmt-tag { background: #2a0000; border-color: #ff4444; color: #ff4444; }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; }

  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .filter-pill { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 6px 14px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .filter-pill:hover { border-color: #888; }
  .filter-pill.active { background: #2a0000; border-color: #ff4444; color: #ff4444; }

  .empty { text-align: center; color: #444; padding: 40px 0; font-size: 14px; }
  hr { border: none; border-top: 1px solid #1a1a1a; margin: 28px 0; }

  #toast { position: fixed; bottom: 24px; right: 24px; background: #22c55e; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: bold; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; transform: translateY(0); }

  .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px 18px; text-align: center; flex: 1; min-width: 80px; }
  .stat-num { font-size: 22px; font-weight: bold; color: #ff4444; }
  .stat-label { font-size: 11px; color: #555; margin-top: 2px; }
</style>
</head>
<body>

<h1>🔍 元動画リサーチ</h1>
<p class="sub">Stitch用の元動画を探して管理する</p>

<!-- ① 参考動画を開く -->
<div class="section">
  <div class="section-title">① 参考動画を開く（Khaby Lame など）</div>
  <div class="input-row">
    <input type="text" id="refUrl" placeholder="TikTok / YouTube URL を貼り付け..." />
    <button class="btn btn-red" onclick="openRef()">開く</button>
  </div>
</div>

<!-- ② 元動画を登録 -->
<div class="section">
  <div class="section-title">② 見つけた元動画を登録</div>
  <div class="form-box">

    <div class="form-row">
      <label class="form-label">元動画 URL（Stitch 対象）</label>
      <input type="text" id="srcUrl" placeholder="https://www.tiktok.com/@..." />
    </div>

    <div class="form-row">
      <label class="form-label">メモ（どんな動画か・ラブがどう反応するか）</label>
      <textarea id="memo" placeholder="例）大げさな料理手順→ラブがシンプルにやってドヤ顔"></textarea>
    </div>

    <div class="section-title" style="margin-bottom:8px;">フォーマット</div>
    <div class="format-pills" id="formatPills">
      <div class="fmt" onclick="selectFmt(this,'キレ反応')">😤 キレ反応</div>
      <div class="fmt" onclick="selectFmt(this,'無言ドヤ')">😐 無言ドヤ</div>
      <div class="fmt" onclick="selectFmt(this,'期待vs現実')">💀 期待vs現実</div>
      <div class="fmt" onclick="selectFmt(this,'逆張り実証')">✅ 逆張り実証</div>
      <div class="fmt" onclick="selectFmt(this,'その他')">📌 その他</div>
    </div>

    <div class="section-title" style="margin-bottom:8px;">再現可能チェック</div>
    <div class="checks">
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="予算ゼロ">💰 予算ゼロ</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="編集不要">✂️ 編集不要</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="1人でOK">🙋 1人でOK</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="小道具なし">🚫 小道具なし</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="屋内OK">🏠 屋内OK</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="5分以内">⏱ 5分以内</div>
    </div>

    <button class="btn btn-green" onclick="addVideo()" style="width:100%">＋ リストに追加</button>
  </div>
</div>

<hr>

<!-- ③ リスト -->
<div class="section">
  <div class="section-title">③ 元動画リスト</div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">合計</div></div>
    <div class="stat"><div class="stat-num" id="statReady">0</div><div class="stat-label">準備OK</div></div>
    <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-label">撮影済み</div></div>
  </div>

  <div class="filter-row">
    <div class="filter-pill active" onclick="setFilter('all',this)">すべて</div>
    <div class="filter-pill" onclick="setFilter('ready',this)">✅ 準備OK（5点以上）</div>
    <div class="filter-pill" onclick="setFilter('done',this)">🎬 撮影済み</div>
    <div class="filter-pill" onclick="setFilter('todo',this)">⏳ 未撮影</div>
  </div>

  <div id="list"><div class="empty">まだ動画がありません</div></div>
</div>

<hr>

<!-- ④ エクスポート -->
<div class="section">
  <div class="section-title">④ スプシ出力</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-gray" onclick="copyCSV()">📋 CSVをコピー</button>
    <button class="btn btn-gray" onclick="downloadCSV()">⬇️ CSVダウンロード</button>
    <button class="btn btn-gray" onclick="openSheets()">📊 Google Sheetsを開く</button>
  </div>
</div>

<div id="toast">✅ 完了</div>

<script>
let videos = JSON.parse(localStorage.getItem('moto_videos') || '[]');
let selectedFmt = '';
let currentFilter = 'all';

function save() { localStorage.setItem('moto_videos', JSON.stringify(videos)); }

function openRef() {
  const url = document.getElementById('refUrl').value.trim();
  if (!url) { toast('URLを入力してください'); return; }
  window.open(url, '_blank');
}

function selectFmt(el, fmt) {
  document.querySelectorAll('.fmt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedFmt = fmt;
}

function getChecked() {
  return [...document.querySelectorAll('.check-pill.active')].map(el => el.dataset.val);
}

function addVideo() {
  const url = document.getElementById('srcUrl').value.trim();
  if (!url) { toast('元動画URLを入力してください'); return; }
  const v = {
    id: Date.now(),
    url,
    memo: document.getElementById('memo').value.trim(),
    format: selectedFmt || 'その他',
    checks: getChecked(),
    done: false,
    addedAt: new Date().toLocaleDateString('ja-JP')
  };
  videos.unshift(v);
  save();
  resetForm();
  render();
  toast('追加しました！');
}

function resetForm() {
  document.getElementById('srcUrl').value = '';
  document.getElementById('memo').value = '';
  document.querySelectorAll('.fmt').forEach(e => e.classList.remove('selected'));
  document.querySelectorAll('.check-pill').forEach(e => e.classList.remove('active'));
  selectedFmt = '';
}

function toggleDone(id) {
  const v = videos.find(x => x.id === id);
  if (v) { v.done = !v.done; save(); render(); }
}

function deleteVideo(id) {
  if (!confirm('削除しますか？')) return;
  videos = videos.filter(x => x.id !== id);
  save();
  render();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filtered() {
  if (currentFilter === 'ready') return videos.filter(v => v.checks.length >= 5);
  if (currentFilter === 'done') return videos.filter(v => v.done);
  if (currentFilter === 'todo') return videos.filter(v => !v.done);
  return videos;
}

function render() {
  const list = document.getElementById('list');
  const fv = filtered();
  document.getElementById('statTotal').textContent = videos.length;
  document.getElementById('statReady').textContent = videos.filter(v => v.checks.length >= 5).length;
  document.getElementById('statDone').textContent = videos.filter(v => v.done).length;
  if (fv.length === 0) { list.innerHTML = '<div class="empty">該当する動画がありません</div>'; return; }
  list.innerHTML = fv.map(v => `
    <div class="card" style="${v.done ? 'opacity:0.5;' : ''}">
      <div class="card-header">
        <div class="card-title">${v.done ? '🎬 ' : ''}${v.format}</div>
        <div class="card-score">${v.checks.length}/6</div>
      </div>
      <div class="card-url">元動画: <a href="${v.url}" target="_blank">${v.url.length > 55 ? v.url.slice(0,55)+'…' : v.url}</a></div>
      ${v.memo ? `<div class="card-note">${v.memo}</div>` : ''}
      <div class="card-tags">
        <span class="tag fmt-tag">${v.format}</span>
        ${v.checks.map(c => `<span class="tag">${c}</span>`).join('')}
      </div>
      <div class="card-actions">
        <button class="btn btn-gray btn-sm" onclick="toggleDone(${v.id})">${v.done ? '↩ 未撮影に戻す' : '✅ 撮影済みにする'}</button>
        <button class="btn btn-gray btn-sm" onclick="deleteVideo(${v.id})">🗑 削除</button>
      </div>
    </div>
  `).join('');
}

function toCSV() {
  const header = ['元動画URL','メモ','フォーマット','再現スコア','再現条件','撮影済み','登録日'];
  const rows = videos.map(v => [
    v.url, v.memo, v.format, `${v.checks.length}/6`,
    v.checks.join('・'), v.done ? '済み' : '未撮影', v.addedAt
  ]);
  return [header,...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
}

function copyCSV() { navigator.clipboard.writeText(toCSV()).then(() => toast('CSVをコピーしました！')); }
function downloadCSV() {
  const blob = new Blob(['﻿' + toCSV()], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `moto_videos_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}
function openSheets() {
  window.open('https://sheets.new', '_blank');
  setTimeout(() => copyCSV(), 300);
  toast('Sheetsを開いてCtrl+VでOK');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

render();
</script>
</body>
</html>
