<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元動画リサーチ — Harbinger</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: 'Hiragino Sans', sans-serif; padding: 20px; max-width: 700px; margin: 0 auto; }

  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #555; font-size: 13px; margin-bottom: 28px; }

  .section { margin-bottom: 28px; }
  .section-title { font-size: 12px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

  .input-row { display: flex; gap: 8px; }
  input[type="text"], textarea {
    background: #111; border: 1px solid #222; border-radius: 10px;
    color: #fff; font-size: 15px; padding: 12px 14px; width: 100%;
    outline: none; transition: border-color 0.2s; font-family: inherit;
  }
  input[type="text"]:focus, textarea:focus { border-color: #ff4444; }
  textarea { resize: vertical; min-height: 60px; }

  .btn { border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; padding: 12px 20px; transition: all 0.15s; white-space: nowrap; }
  .btn-red   { background: #ff4444; color: #fff; }
  .btn-red:hover { background: #ff2222; }
  .btn-gray  { background: #1e1e1e; color: #aaa; border: 1px solid #333; }
  .btn-gray:hover { background: #2a2a2a; color: #fff; }
  .btn-green { background: #22c55e; color: #fff; }
  .btn-green:hover { background: #16a34a; }
  .btn-blue  { background: #3b82f6; color: #fff; }
  .btn-blue:hover { background: #2563eb; }
  .btn-sm { font-size: 12px; padding: 6px 12px; border-radius: 7px; }

  /* 解析ボックス */
  .analyze-box { background: #111; border: 1px solid #222; border-radius: 14px; padding: 20px; }

  /* 結果カード */
  #result { display: none; margin-top: 16px; }
  .result-card { background: #0f1f0f; border: 1px solid #22c55e; border-radius: 12px; padding: 16px; }
  .result-card.not-found { background: #1f1000; border-color: #f59e0b; }
  .result-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .result-value { font-size: 15px; font-weight: bold; margin-bottom: 12px; word-break: break-all; }
  .result-title { font-size: 13px; color: #aaa; margin-bottom: 12px; }
  .result-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .found-badge { font-size: 12px; font-weight: bold; color: #22c55e; margin-bottom: 8px; }
  .warn-badge  { font-size: 12px; font-weight: bold; color: #f59e0b; margin-bottom: 8px; }

  /* ローディング */
  #loading { display: none; text-align: center; padding: 20px; color: #555; font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #333; border-top-color: #ff4444; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 登録フォーム */
  .form-box { background: #111; border: 1px solid #222; border-radius: 14px; padding: 20px; }
  .form-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  label.form-label { font-size: 12px; color: #888; }

  .checks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .check-pill { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: 13px; transition: all 0.15s; user-select: none; }
  .check-pill.active { background: #1a2a1a; border-color: #22c55e; color: #22c55e; }

  .format-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .fmt { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .fmt:hover { border-color: #ff4444; }
  .fmt.selected { background: #2a0000; border-color: #ff4444; color: #ff4444; }

  /* リスト */
  #list { display: flex; flex-direction: column; gap: 12px; }
  .card { background: #111; border: 1px solid #222; border-radius: 14px; padding: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: bold; }
  .card-score { font-size: 13px; color: #22c55e; font-weight: bold; }
  .card-url { font-size: 12px; color: #555; margin-bottom: 6px; word-break: break-all; }
  .card-url a { color: #4499ff; text-decoration: none; }
  .card-url a:hover { text-decoration: underline; }
  .card-note { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; background: #1a2a1a; border: 1px solid #22c55e; color: #22c55e; border-radius: 12px; padding: 3px 10px; }
  .tag.fmt-tag { background: #2a0000; border-color: #ff4444; color: #ff4444; }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .filter-pill { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 6px 14px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .filter-pill:hover { border-color: #888; }
  .filter-pill.active { background: #2a0000; border-color: #ff4444; color: #ff4444; }

  .empty { text-align: center; color: #444; padding: 40px 0; font-size: 14px; }
  hr { border: none; border-top: 1px solid #1a1a1a; margin: 28px 0; }

  #toast { position: fixed; bottom: 24px; right: 24px; background: #22c55e; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: bold; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; z-index: 999; max-width: 280px; }
  #toast.show { opacity: 1; transform: translateY(0); }

  .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px 18px; text-align: center; flex: 1; min-width: 80px; }
  .stat-num { font-size: 22px; font-weight: bold; color: #ff4444; }
  .stat-label { font-size: 11px; color: #555; margin-top: 2px; }

  /* 自動入力ボタン */
  .autofill-btn { display: inline-block; font-size: 12px; color: #22c55e; border: 1px solid #22c55e; border-radius: 8px; padding: 4px 10px; cursor: pointer; margin-top: 8px; background: #0a1a0a; }
  .autofill-btn:hover { background: #1a2a1a; }
</style>
</head>
<body>

<h1>🔍 元動画リサーチ</h1>
<p class="sub">Stitch動画から元の投稿者を自動特定 → 管理 → スプシ出力</p>

<!-- ① Stitch元を自動解析 -->
<div class="section">
  <div class="section-title">① Stitch動画のURLを貼る（Khaby Lameなど）</div>
  <div class="analyze-box">
    <div class="input-row">
      <input type="text" id="stitchUrl" placeholder="https://vt.tiktok.com/... または tiktok.com/@.../video/..." />
      <button class="btn btn-red" onclick="analyzeStitch()">解析</button>
    </div>

    <div id="loading"><span class="spinner"></span>解析中...</div>

    <div id="result">
      <!-- JSで生成 -->
    </div>
  </div>
</div>

<!-- ② 元動画を登録 -->
<div class="section">
  <div class="section-title">② 元動画をリストに登録</div>
  <div class="form-box">

    <div class="form-row">
      <label class="form-label">元動画 URL（Stitch 対象）</label>
      <input type="text" id="srcUrl" placeholder="https://www.tiktok.com/@..." />
    </div>

    <div class="form-row">
      <label class="form-label">メモ（どんな内容か・ラブの反応案）</label>
      <textarea id="memo" placeholder="例）大げさな料理手順→ラブがシンプルにやってドヤ顔"></textarea>
    </div>

    <div class="section-title" style="margin-bottom:8px;">フォーマット</div>
    <div class="format-pills" id="formatPills">
      <div class="fmt" onclick="selectFmt(this,'キレ反応')">😤 キレ反応</div>
      <div class="fmt" onclick="selectFmt(this,'無言ドヤ')">😐 無言ドヤ</div>
      <div class="fmt" onclick="selectFmt(this,'期待vs現実')">💀 期待vs現実</div>
      <div class="fmt" onclick="selectFmt(this,'逆張り実証')">✅ 逆張り実証</div>
      <div class="fmt" onclick="selectFmt(this,'その他')">📌 その他</div>
    </div>

    <div class="section-title" style="margin-bottom:8px;">再現可能チェック</div>
    <div class="checks">
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="予算ゼロ">💰 予算ゼロ</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="編集不要">✂️ 編集不要</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="1人でOK">🙋 1人でOK</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="小道具なし">🚫 小道具なし</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="屋内OK">🏠 屋内OK</div>
      <div class="check-pill" onclick="this.classList.toggle('active')" data-val="5分以内">⏱ 5分以内</div>
    </div>

    <button class="btn btn-green" onclick="addVideo()" style="width:100%">＋ リストに追加</button>
  </div>
</div>

<hr>

<!-- ③ リスト -->
<div class="section">
  <div class="section-title">③ 元動画リスト</div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">合計</div></div>
    <div class="stat"><div class="stat-num" id="statReady">0</div><div class="stat-label">準備OK</div></div>
    <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-label">撮影済み</div></div>
  </div>

  <div class="filter-row">
    <div class="filter-pill active" onclick="setFilter('all',this)">すべて</div>
    <div class="filter-pill" onclick="setFilter('ready',this)">✅ 準備OK（5点以上）</div>
    <div class="filter-pill" onclick="setFilter('done',this)">🎬 撮影済み</div>
    <div class="filter-pill" onclick="setFilter('todo',this)">⏳ 未撮影</div>
  </div>

  <div id="list"><div class="empty">まだ動画がありません</div></div>
</div>

<hr>

<!-- ④ エクスポート -->
<div class="section">
  <div class="section-title">④ スプシ出力</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-gray" onclick="copyCSV()">📋 CSVをコピー</button>
    <button class="btn btn-gray" onclick="downloadCSV()">⬇️ CSVダウンロード</button>
    <button class="btn btn-gray" onclick="openSheets()">📊 Google Sheetsを開く</button>
  </div>
</div>

<div id="toast">✅ 完了</div>

<script>
let videos = JSON.parse(localStorage.getItem('moto_videos') || '[]');
let selectedFmt = '';
let currentFilter = 'all';
let lastFoundUrl = '';  // 解析で見つかったURL（自動入力用）

function save() { localStorage.setItem('moto_videos', JSON.stringify(videos)); }

// ============================================================
//  Stitch元を解析
// ============================================================
async function analyzeStitch() {
  const url = document.getElementById('stitchUrl').value.trim();
  if (!url) { toast('URLを入力してください'); return; }

  document.getElementById('result').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    // TikTok oEmbed API（公開・CORS対応）
    const oembedEndpoint = `https://www.tiktok.com/oembed?url=${encodeURIComponent(url)}`;
    let data = null;

    // まず直接fetch
    try {
      const res = await fetch(oembedEndpoint);
      data = await res.json();
    } catch(e) {
      // CORS失敗→プロキシ経由
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(oembedEndpoint)}`;
      const res2 = await fetch(proxyUrl);
      const json2 = await res2.json();
      data = JSON.parse(json2.contents);
    }

    document.getElementById('loading').style.display = 'none';
    showResult(url, data);

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showFallback(url);
  }
}

function showResult(inputUrl, data) {
  const title = data.title || '';
  const authorName = data.author_name || '';
  const authorUrl  = data.author_url  || '';

  // @mention を全部抽出
  const mentions = [...new Set((title.match(/@[\w.]+/g) || []))];
  // 投稿者自身のアカウントを除外
  const authorHandle = (authorUrl.match(/@([\w.]+)/) || [])[1] || '';
  const others = mentions.filter(m => m.toLowerCase() !== ('@' + authorHandle).toLowerCase());

  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';

  if (others.length > 0) {
    // Stitch元のアカウントが見つかった
    const handles = others;
    lastFoundUrl = `https://www.tiktok.com/${handles[0]}`;

    resultDiv.innerHTML = `
      <div class="result-card">
        <div class="found-badge">✅ Stitch元アカウントを検出</div>
        <div class="result-label">この動画の投稿者</div>
        <div class="result-value">@${authorHandle} — ${authorName}</div>
        <div class="result-label">冒頭に使われた元動画の投稿者</div>
        <div class="result-value">${handles.join('  /  ')}</div>
        <div class="result-label">動画タイトル</div>
        <div class="result-title">${escHtml(title)}</div>
        <div class="result-btns">
          ${handles.map(h => `
            <a href="https://www.tiktok.com/${h}" target="_blank" class="btn btn-blue btn-sm">${h} のページを開く</a>
          `).join('')}
          <button class="btn btn-gray btn-sm" onclick="openOriginal('${escHtml(inputUrl)}')">Stitch動画を開く</button>
        </div>
        <div class="autofill-btn" onclick="autofill('${escHtml(lastFoundUrl)}', '${escHtml(title)}')">
          ↓ このURLを②登録フォームに自動入力
        </div>
      </div>
    `;
  } else {
    // @mention なし → Stitch以外の動画 or 情報不足
    resultDiv.innerHTML = `
      <div class="result-card not-found">
        <div class="warn-badge">⚠️ Stitch元アカウントが見つかりませんでした</div>
        <div class="result-label">この動画の投稿者</div>
        <div class="result-value">@${authorHandle} — ${authorName}</div>
        <div class="result-label">動画タイトル</div>
        <div class="result-title">${escHtml(title)}</div>
        <p style="font-size:13px;color:#aaa;margin-top:10px;">
          Stitch以外のフォーマットかもしれません。<br>動画を直接開いて冒頭を確認してください。
        </p>
        <div class="result-btns" style="margin-top:12px;">
          <button class="btn btn-gray btn-sm" onclick="openOriginal('${escHtml(inputUrl)}')">動画を直接開く</button>
        </div>
      </div>
    `;
  }
}

function showFallback(url) {
  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = `
    <div class="result-card not-found">
      <div class="warn-badge">⚠️ 自動解析できませんでした</div>
      <p style="font-size:13px;color:#aaa;margin-bottom:12px;">
        URLを直接開いて冒頭の元動画を確認してください。
      </p>
      <div class="result-btns">
        <button class="btn btn-gray btn-sm" onclick="openOriginal('${escHtml(url)}')">動画を直接開く</button>
      </div>
    </div>
  `;
}

function openOriginal(url) { window.open(url, '_blank'); }

function autofill(url, title) {
  document.getElementById('srcUrl').value = url;
  document.getElementById('memo').value = title;
  document.getElementById('srcUrl').focus();
  toast('フォームに自動入力しました');
  // スクロール
  document.querySelector('.section:nth-child(2)').scrollIntoView({ behavior: 'smooth' });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ============================================================
//  登録フォーム
// ============================================================
function selectFmt(el, fmt) {
  document.querySelectorAll('.fmt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedFmt = fmt;
}

function getChecked() {
  return [...document.querySelectorAll('.check-pill.active')].map(el => el.dataset.val);
}

function addVideo() {
  const url = document.getElementById('srcUrl').value.trim();
  if (!url) { toast('元動画URLを入力してください'); return; }
  const v = {
    id: Date.now(),
    url,
    memo: document.getElementById('memo').value.trim(),
    format: selectedFmt || 'その他',
    checks: getChecked(),
    done: false,
    addedAt: new Date().toLocaleDateString('ja-JP')
  };
  videos.unshift(v);
  save();
  resetForm();
  render();
  toast('追加しました！');
}

function resetForm() {
  document.getElementById('srcUrl').value = '';
  document.getElementById('memo').value = '';
  document.querySelectorAll('.fmt').forEach(e => e.classList.remove('selected'));
  document.querySelectorAll('.check-pill').forEach(e => e.classList.remove('active'));
  selectedFmt = '';
}

function toggleDone(id) {
  const v = videos.find(x => x.id === id);
  if (v) { v.done = !v.done; save(); render(); }
}

function deleteVideo(id) {
  if (!confirm('削除しますか？')) return;
  videos = videos.filter(x => x.id !== id);
  save();
  render();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filtered() {
  if (currentFilter === 'ready') return videos.filter(v => v.checks.length >= 5);
  if (currentFilter === 'done') return videos.filter(v => v.done);
  if (currentFilter === 'todo') return videos.filter(v => !v.done);
  return videos;
}

function render() {
  const list = document.getElementById('list');
  const fv = filtered();
  document.getElementById('statTotal').textContent = videos.length;
  document.getElementById('statReady').textContent = videos.filter(v => v.checks.length >= 5).length;
  document.getElementById('statDone').textContent = videos.filter(v => v.done).length;

  if (fv.length === 0) { list.innerHTML = '<div class="empty">該当する動画がありません</div>'; return; }

  list.innerHTML = fv.map(v => `
    <div class="card" style="${v.done ? 'opacity:0.5;' : ''}">
      <div class="card-header">
        <div class="card-title">${v.done ? '🎬 ' : ''}${escHtml(v.format)}</div>
        <div class="card-score">${v.checks.length}/6</div>
      </div>
      <div class="card-url">元動画: <a href="${escHtml(v.url)}" target="_blank">${v.url.length > 55 ? escHtml(v.url.slice(0,55))+'…' : escHtml(v.url)}</a></div>
      ${v.memo ? `<div class="card-note">${escHtml(v.memo)}</div>` : ''}
      <div class="card-tags">
        <span class="tag fmt-tag">${escHtml(v.format)}</span>
        ${v.checks.map(c => `<span class="tag">${escHtml(c)}</span>`).join('')}
      </div>
      <div class="card-actions">
        <button class="btn btn-gray btn-sm" onclick="toggleDone(${v.id})">${v.done ? '↩ 未撮影に戻す' : '✅ 撮影済みにする'}</button>
        <button class="btn btn-gray btn-sm" onclick="deleteVideo(${v.id})">🗑 削除</button>
      </div>
    </div>
  `).join('');
}

// ============================================================
//  CSV
// ============================================================
function toCSV() {
  const header = ['元動画URL','メモ','フォーマット','再現スコア','再現条件','撮影済み','登録日'];
  const rows = videos.map(v => [
    v.url, v.memo, v.format, `${v.checks.length}/6`,
    v.checks.join('・'), v.done ? '済み' : '未撮影', v.addedAt
  ]);
  return [header,...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
}

function copyCSV() { navigator.clipboard.writeText(toCSV()).then(() => toast('CSVをコピーしました！')); }
function downloadCSV() {
  const blob = new Blob(['﻿' + toCSV()], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `moto_videos_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
function openSheets() {
  window.open('https://sheets.new', '_blank');
  setTimeout(() => copyCSV(), 300);
  toast('Sheetsを開いてCtrl+VでOK');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

render();
</script>
</body>
</html>
